services:
  postgres:
    image: postgres:16
    container_name: sms-platform-postgres
    environment:
      POSTGRES_DB: sms_platform
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: sms_password
    ports:
      - "5433:5432"
    volumes:
      - sms_postgres_data:/var/lib/postgresql/data

volumes:
  sms_postgres_data: