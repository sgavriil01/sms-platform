services:
  postgres:
    image: postgres:16
    container_name: sms-platform-postgres
    environment:
      POSTGRES_DB: sms_platform
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: sms_password
    ports:
      - "5433:5432"
    volumes:
      - sms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms_user -d sms_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: sms-platform-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  sms-platform:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: sms-platform-api
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/sms_platform
      QUARKUS_DATASOURCE_USERNAME: sms_user
      QUARKUS_DATASOURCE_PASSWORD: sms_password
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8080:8080"

volumes:
  sms_postgres_data: